<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM AgroJardinería · Cotizador Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap');
:root{
  --forest:#0e2318;--pine:#1a3d2b;--fern:#2d6a4f;--moss:#52b788;--dew:#d8f3dc;
  --ember:#d4651a;--flame:#f4831f;--gold:#f5a623;--cream:#fdf8f0;
  --paper:#f7f5f0;--stone:#e8e5de;--ash:#c4c1b8;--slate:#7a7870;--ink:#1c1b18;--white:#ffffff;
  --r1:6px;--r2:10px;--r3:16px;--r4:22px;
  --s1:0 1px 3px rgba(14,35,24,.06),0 1px 2px rgba(14,35,24,.04);
  --s2:0 3px 10px rgba(14,35,24,.08),0 1px 3px rgba(14,35,24,.05);
  --s3:0 8px 24px rgba(14,35,24,.11),0 3px 8px rgba(14,35,24,.06);
  --s4:0 20px 48px rgba(14,35,24,.14),0 6px 16px rgba(14,35,24,.08);
  --serif:"DM Serif Display",Georgia,serif;
  --sans:"DM Sans",system-ui,sans-serif;
  --t1:150ms cubic-bezier(.4,0,.2,1);--t2:250ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100dvh}
button,input{font-family:var(--sans)}
button{cursor:pointer}

/* HEADER */
.hdr{background:var(--forest);position:sticky;top:0;z-index:400;box-shadow:0 2px 20px rgba(0,0,0,.35)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;gap:8px}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.brand-icon{width:32px;height:32px;border-radius:var(--r2);flex-shrink:0;background:linear-gradient(135deg,var(--fern),var(--moss));display:flex;align-items:center;justify-content:center;font-size:16px}
.brand-name{font-family:var(--serif);font-size:15px;color:var(--white);line-height:1.1}
.brand-sub{font-size:9px;color:rgba(255,255,255,.38);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.com-pill{display:none;align-items:center;gap:5px;background:rgba(212,101,26,.18);border:1px solid rgba(212,101,26,.4);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600;color:#ffc07a}
.com-pill b{font-family:var(--serif);font-size:12px;font-style:italic;color:#ffd9a8}
.btn-cart{background:var(--ember);color:var(--white);border:none;border-radius:var(--r2);padding:7px 12px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;transition:background var(--t1)}
.btn-cart:hover{background:var(--flame)}
.cart-badge{background:var(--white);color:var(--ember);border-radius:50%;width:17px;height:17px;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center}

/* NAV */
.nav{display:flex;border-top:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.2)}
.nav-btn{flex:1;padding:7px 2px;border:none;background:none;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.35);transition:all var(--t1);position:relative}
.nav-btn.active{color:var(--gold);background:rgba(212,101,26,.1)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:2px 2px 0 0}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* CATALOG BAR */
.cat-bar{background:var(--white);border-bottom:1px solid var(--stone);padding:8px 12px 7px;position:sticky;z-index:200}
.srch-wrap{position:relative;margin-bottom:7px}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none;font-size:13px}
.srch{width:100%;padding:8px 10px 8px 30px;border:1.5px solid var(--stone);border-radius:var(--r2);font-size:12px;background:var(--paper);color:var(--ink);outline:none;transition:border-color var(--t1),background var(--t1)}
.srch:focus{border-color:var(--moss);background:var(--white)}
.srch::placeholder{color:var(--ash)}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 10px;border-radius:20px;border:1.5px solid var(--stone);background:var(--white);font-size:9.5px;font-weight:600;color:var(--slate);transition:all var(--t1);letter-spacing:.2px;white-space:nowrap}
.chip:hover{border-color:var(--moss);color:var(--fern)}
.chip.active{background:var(--pine);border-color:var(--pine);color:var(--white)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:8px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr);gap:10px;padding:12px}}

/* CARD */
.card{background:var(--white);border-radius:var(--r3);padding:11px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--s1);border:1.5px solid var(--stone);transition:transform var(--t2),box-shadow var(--t2),border-color var(--t2);position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:var(--s2);border-color:var(--ash)}
.card.in-cart{border-color:var(--moss)}
.card.in-cart::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,var(--fern),var(--moss))}
.card-qty{position:absolute;top:8px;right:8px;background:var(--pine);color:var(--white);border-radius:50%;width:18px;height:18px;font-size:9.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.card-cat{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--fern);background:var(--dew);border-radius:var(--r1);padding:2px 6px;width:fit-content}
.card-name{font-size:11px;font-weight:500;line-height:1.35;color:var(--ink);flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-row{display:flex;justify-content:space-between;align-items:center}
.card-code{font-size:9px;color:var(--ash)}
.card-brand{font-size:9px;font-weight:700;color:var(--fern)}
.card-price{font-family:var(--serif);font-size:18px;color:var(--pine);line-height:1}
.card-price small{font-family:var(--sans);font-size:9.5px;color:var(--ash);font-weight:400}
.card-com{background:var(--cream);border:1px solid #f0d8b0;border-radius:var(--r1);padding:4px 8px;display:flex;justify-content:space-between;align-items:center}
.card-com-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ember)}
.card-com-val{font-family:var(--serif);font-size:13px;color:#a84a00;font-style:italic}
.card-actions{display:flex;gap:5px}
.btn-add{flex:1;padding:6px 8px;background:var(--pine);color:var(--white);border:none;border-radius:var(--r1);font-size:10.5px;font-weight:600;transition:background var(--t1)}
.btn-add:hover{background:var(--fern)}
.btn-add.added{background:var(--ember)}

.empty-state{grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--ash);font-size:13px}

/* AI MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(14,35,24,.7);z-index:600;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-height:90dvh;display:flex;flex-direction:column;box-shadow:var(--s4);animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{padding:14px 16px 12px;border-bottom:1px solid var(--stone);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.modal-pill{display:inline-flex;align-items:center;gap:4px;margin-bottom:4px;background:var(--cream);border:1px solid var(--gold);border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ember)}
.modal-prod-name{font-family:var(--serif);font-size:15px;color:var(--pine);line-height:1.2}
.modal-prod-meta{font-size:10px;color:var(--ash);margin-top:2px}
.btn-close{background:var(--paper);border:1.5px solid var(--stone);border-radius:var(--r1);width:28px;height:28px;font-size:14px;color:var(--slate);flex-shrink:0;transition:all var(--t1)}
.btn-close:hover{background:var(--stone)}
.modal-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.chat-msgs{display:flex;flex-direction:column;gap:10px;min-height:60px;flex:1}
.msg{max-width:88%;display:flex;flex-direction:column;gap:3px}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.ai{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:9px 12px;border-radius:var(--r3);font-size:12px;line-height:1.5}
.msg.user .msg-bubble{background:var(--pine);color:var(--white);border-bottom-right-radius:var(--r1)}
.msg.ai .msg-bubble{background:var(--paper);border:1.5px solid var(--stone);color:var(--ink);border-bottom-left-radius:var(--r1)}
.msg-time{font-size:9px;color:var(--ash);padding:0 2px}
.ai-typing{display:flex;gap:4px;padding:12px;background:var(--paper);border:1.5px solid var(--stone);border-radius:var(--r3) var(--r3) var(--r3) var(--r1);width:fit-content}
.ai-typing span{width:6px;height:6px;background:var(--ash);border-radius:50%;animation:bounce .9s infinite}
.ai-typing span:nth-child(2){animation-delay:.15s}
.ai-typing span:nth-child(3){animation-delay:.30s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.quick-qs{display:flex;flex-wrap:wrap;gap:5px}
.quick-q{padding:5px 10px;background:var(--white);border:1.5px solid var(--stone);border-radius:20px;font-size:10.5px;color:var(--slate);font-weight:500;transition:all var(--t1)}
.quick-q:hover{border-color:var(--moss);color:var(--fern);background:var(--dew)}
.chat-input-row{display:flex;gap:6px}
.chat-in{flex:1;padding:9px 12px;border:1.5px solid var(--stone);border-radius:var(--r2);font-size:12px;background:var(--paper);color:var(--ink);outline:none;transition:border-color var(--t1)}
.chat-in:focus{border-color:var(--moss);background:var(--white)}
.chat-in::placeholder{color:var(--ash)}
.btn-send{padding:9px 14px;background:var(--pine);color:var(--white);border:none;border-radius:var(--r2);font-size:13px;transition:background var(--t1)}
.btn-send:hover{background:var(--fern)}
.btn-send:disabled{opacity:.5;cursor:not-allowed}

/* CART */
.cart-wrap{padding:8px}
.cart-empty{text-align:center;padding:56px 20px;color:var(--ash)}
.cart-empty .ei{font-size:36px;margin-bottom:8px;opacity:.35}
.ci{background:var(--white);border-radius:var(--r2);padding:10px 11px;margin-bottom:6px;box-shadow:var(--s1);border:1.5px solid var(--stone);display:flex;gap:9px;align-items:flex-start}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:11.5px;font-weight:500;line-height:1.3;margin-bottom:1px}
.ci-cat{font-size:9px;color:var(--fern);font-weight:600}
.ci-unit{font-size:10px;color:var(--ash);margin-top:2px}
.ci-com{display:inline-flex;align-items:center;gap:3px;margin-top:4px;background:var(--cream);border:1px solid #f0d8b0;border-radius:4px;padding:2px 7px;font-size:9.5px;color:#9a4a00;font-weight:600}
.ci-com b{font-family:var(--serif);font-size:10.5px;font-style:italic}
.ci-ctrl{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.btn-del{background:none;border:none;color:var(--ash);font-size:13px;transition:color var(--t1)}
.btn-del:hover{color:#c44}
.qty{display:flex;align-items:center;border:1.5px solid var(--stone);border-radius:var(--r1);overflow:hidden}
.q-btn{background:var(--paper);border:none;width:26px;height:26px;font-size:14px;font-weight:700;color:var(--fern);transition:background var(--t1)}
.q-btn:hover{background:var(--stone)}
.q-num{width:26px;text-align:center;font-size:12px;font-weight:700}
.ci-sub{font-family:var(--serif);font-size:14px;color:var(--pine);font-style:italic}
.com-panel{background:linear-gradient(135deg,#fffaf0,#fff5e0);border:1.5px solid #f0d080;border-radius:var(--r3);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.cpl-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ember)}
.cpl-sub{font-size:9.5px;color:#c07030;margin-top:2px}
.cpl-val{font-family:var(--serif);font-size:26px;color:#a84f00;font-style:italic}
.totals{background:var(--white);border-radius:var(--r3);border:1.5px solid var(--moss);padding:13px;box-shadow:var(--s2)}
.t-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--stone)}
.t-row:last-of-type{border-bottom:none}
.t-lbl{font-size:11.5px;color:var(--slate)}
.t-val{font-family:var(--serif);font-size:13px;color:var(--ink);font-style:italic}
.t-row.main .t-lbl{font-size:12.5px;font-weight:700;color:var(--pine)}
.t-row.main .t-val{font-size:21px;color:var(--pine)}

/* CUOTAS */
.cuotas-box{background:linear-gradient(135deg,#f0faf5,#e8f5ee);border:1.5px solid var(--moss);border-radius:var(--r3);padding:13px;margin-top:10px}
.cuotas-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--fern);margin-bottom:10px}
.cuotas-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.cuota-tab{flex:1;min-width:44px;padding:5px 4px;border:1.5px solid var(--stone);border-radius:var(--r1);background:var(--white);font-size:10px;font-weight:600;color:var(--slate);transition:all var(--t1);text-align:center}
.cuota-tab.active{background:var(--pine);border-color:var(--pine);color:var(--white)}
.cuotas-result{text-align:center}
.cuota-monto{font-family:var(--serif);font-size:28px;color:var(--pine);font-style:italic}
.cuota-sub{font-size:10px;color:var(--slate);margin-top:2px}
.cuota-nota{font-size:9.5px;color:var(--ash);margin-top:6px;font-style:italic}
.btn-go{width:100%;margin-top:11px;padding:12px;background:var(--ember);color:var(--white);border:none;border-radius:var(--r2);font-size:12.5px;font-weight:600;transition:background var(--t1);letter-spacing:.1px}
.btn-go:hover{background:var(--flame)}

/* HISTORIAL */
.hist-wrap{padding:8px}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 10px}
.hist-title{font-family:var(--serif);font-size:18px;color:var(--pine)}
.btn-clr{background:none;border:1.5px solid var(--stone);border-radius:var(--r1);padding:4px 10px;font-size:10px;color:var(--ash);transition:all var(--t1)}
.btn-clr:hover{border-color:#c44;color:#c44}
.hist-empty{text-align:center;padding:48px 20px;color:var(--ash)}
.stat-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.stat-card{background:var(--white);border-radius:var(--r2);padding:10px 12px;border:1.5px solid var(--stone);text-align:center}
.stat-val{font-family:var(--serif);font-size:20px;color:var(--pine);font-style:italic;line-height:1}
.stat-lbl{font-size:8.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ash);margin-top:3px;font-weight:600}
.stat-card.green{border-color:var(--moss)}
.stat-card.green .stat-val{color:var(--fern)}
.stat-card.orange .stat-val{color:var(--ember)}
.hcard{background:var(--white);border-radius:var(--r2);padding:12px 13px;margin-bottom:7px;box-shadow:var(--s1);border:1.5px solid var(--stone)}
.hcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.hcard-num{font-family:var(--serif);font-size:13px;color:var(--pine);font-style:italic}
.hcard-date{font-size:9.5px;color:var(--ash)}
.hcard-client{font-size:12px;font-weight:500;margin-bottom:2px}
.hcard-items{font-size:10px;color:var(--slate)}
.hcard-prods{font-size:10px;color:var(--ash);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hcard-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:9px;flex-wrap:wrap;gap:6px}
.hcard-total{font-family:var(--serif);font-size:16px;color:var(--pine);font-style:italic}
.hcard-com{font-size:10px;color:var(--ember);font-weight:600}
.sts{padding:4px 8px;border:1.5px solid var(--stone);border-radius:var(--r1);font-size:10px;font-weight:600;background:var(--paper);color:var(--ink);outline:none;cursor:pointer;transition:all var(--t1)}
.sts.enviada{border-color:var(--ash);color:var(--slate)}
.sts.negoc{border-color:var(--gold);color:#8a6000;background:#fffbe8}
.sts.ganada{border-color:var(--moss);color:var(--fern);background:var(--dew)}
.sts.perdida{border-color:#f0a0a0;color:#c44;background:#fff5f5}

/* FORM */
.form-wrap{padding:8px}
.fcard{background:var(--white);border-radius:var(--r3);padding:14px;margin-bottom:8px;box-shadow:var(--s1);border:1.5px solid var(--stone)}
.fcard-title{font-family:var(--serif);font-size:15px;color:var(--pine);font-style:italic;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--stone);display:flex;align-items:center;gap:6px}
.fg{margin-bottom:9px}
.fg label{display:block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ash);margin-bottom:4px}
.fg input{width:100%;padding:8px 11px;border:1.5px solid var(--stone);border-radius:var(--r1);font-size:12px;background:var(--paper);color:var(--ink);outline:none;transition:border-color var(--t1),background var(--t1)}
.fg input:focus{border-color:var(--moss);background:var(--white)}
.fg input::placeholder{color:var(--ash)}

/* PROFORMA */
.pf-wrap{padding:8px}
.pf-doc{background:var(--white);border-radius:var(--r3);box-shadow:var(--s3);border:1px solid var(--stone);overflow:hidden}
.pf-head{background:var(--forest);color:var(--white);padding:18px 16px 13px}
.pf-co{font-family:var(--serif);font-size:20px;font-style:italic}
.pf-sub{font-size:8px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.4px;margin-top:1px}
.pf-stripe{height:3px;background:linear-gradient(90deg,var(--ember),var(--flame))}
.pf-meta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:12px}
.pf-num{background:var(--ember);padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700}
.pf-date{font-size:10.5px;opacity:.55}
.pf-body{padding:14px}
.pf-sec{margin-bottom:13px;padding-bottom:12px;border-bottom:1px solid var(--stone)}
.pf-sec:last-child{border-bottom:none}
.pf-sec h4{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--moss);margin-bottom:7px}
.cli-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px}
.cli-item{font-size:11px}
.cli-item strong{display:block;font-size:8px;color:var(--ash);text-transform:uppercase;letter-spacing:.4px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--forest);color:var(--white);padding:6px 7px;text-align:left;font-size:8px;letter-spacing:.5px;text-transform:uppercase}
.tbl th:last-child{text-align:right}
.tbl td{padding:7px;border-bottom:1px solid var(--stone);vertical-align:top}
.tbl td:last-child{text-align:right;font-weight:600;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:var(--paper)}
.pf-total-main{background:var(--forest);color:var(--white);padding:9px 11px;border-radius:var(--r2);display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.pf-tm-lbl{font-size:12px;font-weight:600}
.pf-tm-val{font-family:var(--serif);font-size:20px;font-style:italic}
.pf-t-row{display:flex;justify-content:space-between;padding:5px 0;font-size:11px;border-bottom:1px solid var(--stone)}
.pf-t-row:last-child{border-bottom:none}
.pf-conds{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px}
.pf-cond{background:var(--paper);border-radius:var(--r2);padding:9px;border-left:2.5px solid var(--moss)}
.pf-cond h5{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--fern);margin-bottom:3px}
.pf-cond p{font-size:10px;color:var(--slate);line-height:1.4}
.pf-note{text-align:center;padding:8px 0 2px;font-size:9px;color:var(--ash);font-style:italic}
.pf-actions{padding:8px;display:flex;flex-direction:column;gap:7px}
.btn-action{width:100%;padding:12px;border:none;border-radius:var(--r2);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity var(--t1),transform 60ms}
.btn-action:active{transform:scale(.98)}
.btn-pdf{background:var(--pine);color:var(--white)}
.btn-pdf:hover{background:var(--fern)}
.btn-wsp{background:#22c55e;color:var(--white)}
.btn-wsp:hover{background:#16a34a}
.btn-new{background:var(--paper);color:var(--ink);border:1.5px solid var(--stone)}

/* TOAST & LOADER */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--pine);color:var(--white);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;transition:transform .25s ease;white-space:nowrap;box-shadow:var(--s3);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.loader{position:fixed;inset:0;background:rgba(14,35,24,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:var(--white);gap:14px}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:12px;opacity:.7}

// ── STATE ──────────────────────────────────────────────────
let carrito    = [];
let catActiva  = 'TODOS';
let busqueda   = '';
let cuotaMeses = 6;
let numPRF     = genNum();
let historial  = JSON.parse(localStorage.getItem('imag_hist') || '[]');

function genNum() {
  var d = new Date(), r = String(Math.floor(Math.random()*999)+1).padStart(3,'0');
  return 'PRF-'+d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate())+'-'+r;
}
function p2(n) { return String(n).padStart(2,'0'); }

// ── NAVIGATION ─────────────────────────────────────────────
function ir(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+id).classList.add('active');
  var nb = document.querySelector('.nav-btn[data-page="'+id+'"]');
  if (nb) nb.classList.add('active');
  if (id === 'carrito')   renderCarrito();
  if (id === 'proforma')  renderProforma();
  if (id === 'historial') renderHistorial();
  if (id === 'catalogo')  syncBar();
  window.scrollTo(0,0);
}
function syncBar() {
  var hh = document.querySelector('.hdr').offsetHeight;
  var cb = document.getElementById('cat-bar');
  if (cb) cb.style.top = hh + 'px';
}

// ── CATALOG ────────────────────────────────────────────────
function initCatalogo() {
  var set = new Set();
  PRODS.forEach(function(p){ if (p.categoria) set.add(p.categoria.trim()); });
  var cats = ['TODOS'].concat(Array.from(set).sort());
  var row = document.getElementById('chips');
  row.innerHTML = '';
  cats.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (cat === 'TODOS' ? ' active' : '');
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.addEventListener('click', function(){ setCat(cat); });
    row.appendChild(btn);
  });
  syncBar();
  renderGrid();
}

function setCat(cat) {
  catActiva = cat;
  document.querySelectorAll('.chip').forEach(function(c){
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  var active = document.querySelector('.chip.active');
  if (active) active.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  renderGrid();
}

function filtrar() {
  busqueda = document.getElementById('srch').value.toLowerCase().trim();
  renderGrid();
}

function renderGrid() {
  var grid = document.getElementById('grid');
  var lista = PRODS.slice();
  if (catActiva !== 'TODOS') {
    lista = lista.filter(function(p){ return (p.categoria||'').trim() === catActiva; });
  }
  if (busqueda) {
    lista = lista.filter(function(p){
      return p.nombre.toLowerCase().indexOf(busqueda) >= 0 ||
             p.codigo.toLowerCase().indexOf(busqueda) >= 0 ||
             (p.marca||'').toLowerCase().indexOf(busqueda) >= 0;
    });
  }
  grid.innerHTML = '';
  if (lista.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div style="font-size:32px;margin-bottom:8px">🔍</div><p>Sin resultados para "'+esc(busqueda)+'"</p></div>';
    return;
  }
  lista.forEach(function(p) {
    var inC = carrito.find(function(c){ return c.codigo === p.codigo; });
    var qty = inC ? inC.cantidad : 0;
    var com = Number(p.usd_com) || (p.pvp * (p.comision || 0));

    var div = document.createElement('div');
    div.className = 'card' + (qty > 0 ? ' in-cart' : '');
    div.id = 'card-' + p.codigo;

    var inner = '';
    if (qty > 0) inner += '<div class="card-qty">'+qty+'</div>';
    inner += '<span class="card-cat">'+esc(p.categoria||'')+'</span>';
    inner += '<div class="card-name">'+esc(p.nombre)+'</div>';
    inner += '<div class="card-row"><span class="card-code">'+esc(p.codigo)+'</span><span class="card-brand">'+esc(p.marca||'')+'</span></div>';
    inner += '<div class="card-price">$'+fmt(p.pvp)+' <small>USD</small></div>';
    inner += '<div class="card-com"><span class="card-com-lbl">💰 Tu comisión</span><span class="card-com-val">$'+fmt(com)+'</span></div>';
    div.innerHTML = inner;

    var acts = document.createElement('div');
    acts.className = 'card-actions';

    var btnAdd = document.createElement('button');
    btnAdd.className = 'btn-add' + (qty > 0 ? ' added' : '');
    btnAdd.textContent = qty > 0 ? '✓ En carrito' : '+ Agregar';
    (function(codigo){ btnAdd.addEventListener('click', function(){ addToCart(codigo); }); })(p.codigo);

    acts.appendChild(btnAdd);
    div.appendChild(acts);
    grid.appendChild(div);
  });
}

// ── CART ───────────────────────────────────────────────────
function addToCart(codigo) {
  var prod = PRODS.find(function(p){ return p.codigo === codigo; });
  if (!prod) return;
  var idx = carrito.findIndex(function(c){ return c.codigo === codigo; });
  if (idx >= 0) carrito[idx].cantidad++;
  else carrito.push(Object.assign({}, prod, {cantidad:1}));
  syncContador();
  renderGrid();
  toast('✓ ' + prod.nombre.substring(0,30) + (prod.nombre.length > 30 ? '…' : '') + ' agregado');
}

function qtyChange(codigo, d) {
  var idx = carrito.findIndex(function(c){ return c.codigo === codigo; });
  if (idx < 0) return;
  carrito[idx].cantidad += d;
  if (carrito[idx].cantidad <= 0) carrito.splice(idx, 1);
  syncContador(); renderCarrito(); renderGrid();
}

function delItem(codigo) {
  carrito = carrito.filter(function(c){ return c.codigo !== codigo; });
  syncContador(); renderCarrito(); renderGrid();
}

function syncContador() {
  var total = carrito.reduce(function(s,c){ return s + c.cantidad; }, 0);
  document.getElementById('cart-badge').textContent = total;
  var pill = document.getElementById('com-pill');
  if (carrito.length > 0) {
    pill.style.display = 'flex';
    document.getElementById('com-pill-val').textContent = '$' + fmt(getTotals().comision);
  } else {
    pill.style.display = 'none';
  }
}

function getTotals() {
  var contado  = carrito.reduce(function(s,c){ return s + c.pvp * c.cantidad; }, 0);
  var tarjeta  = carrito.reduce(function(s,c){ return s + c.pvp_tarjeta * c.cantidad; }, 0);
  var comision = carrito.reduce(function(s,c){ return s + (Number(c.usd_com)||(c.pvp*(c.comision||0))) * c.cantidad; }, 0);
  return {contado:contado, tarjeta:tarjeta, comision:comision};
}

function renderCarrito() {
  var wrap = document.getElementById('cart-wrap');
  if (carrito.length === 0) {
    wrap.innerHTML = '<div class="cart-empty"><div class="ei">🛒</div><p style="margin-bottom:4px">Tu carrito está vacío</p><p style="font-size:11px;opacity:.6">Agrega productos desde el catálogo</p></div>';
    return;
  }
  var t = getTotals();
  var html = '';

  carrito.forEach(function(item) {
    var comItem = (Number(item.usd_com)||(item.pvp*(item.comision||0))) * item.cantidad;
    html += '<div class="ci">';
    html += '<div class="ci-info">';
    html += '<div class="ci-name">'+esc(item.nombre)+'</div>';
    html += '<div class="ci-cat">'+esc(item.categoria)+'</div>';
    html += '<div class="ci-unit">$'+fmt(item.pvp)+' c/u</div>';
    html += '<div class="ci-com">💰 <b>$'+fmt(comItem)+'</b> comisión</div>';
    html += '</div>';
    html += '<div class="ci-ctrl">';
    html += '<button class="btn-del" onclick="delItem(\''+item.codigo+'\')">✕</button>';
    html += '<div class="qty">';
    html += '<button class="q-btn" onclick="qtyChange(\''+item.codigo+'\',-1)">−</button>';
    html += '<span class="q-num">'+item.cantidad+'</span>';
    html += '<button class="q-btn" onclick="qtyChange(\''+item.codigo+'\',1)">+</button>';
    html += '</div>';
    html += '<div class="ci-sub">$'+fmt(item.pvp*item.cantidad)+'</div>';
    html += '</div></div>';
  });

  // Comision panel
  html += '<div class="com-panel">';
  html += '<div><div class="cpl-lbl">💰 Tu comisión total</div>';
  html += '<div class="cpl-sub">'+carrito.length+' prod. · '+carrito.reduce(function(s,c){return s+c.cantidad;},0)+' unid.</div></div>';
  html += '<div class="cpl-val">$'+fmt(t.comision)+'</div></div>';

  // Totals
  html += '<div class="totals">';
  html += '<div class="t-row main"><span class="t-lbl">💵 Total Contado</span><span class="t-val">$'+fmt(t.contado)+'</span></div>';
  html += '<div class="t-row"><span class="t-lbl">💳 Total con Tarjeta</span><span class="t-val" style="font-size:15px">$'+fmt(t.tarjeta)+'</span></div>';
  html += '<button class="btn-go" onclick="ir(\'cliente\')">👤 Datos del Cliente →</button>';
  html += '</div>';

  // Calculadora cuotas
  var mesesOpts = [3, 6, 9, 12, 18, 24];
  html += '<div class="cuotas-box">';
  html += '<div class="cuotas-title">🧮 Calculadora de Cuotas</div>';
  html += '<div class="cuotas-tabs">';
  mesesOpts.forEach(function(m) {
    html += '<button class="cuota-tab'+(m===cuotaMeses?' active':'')+'" onclick="setCuota('+m+')">'+m+' meses</button>';
  });
  html += '</div>';
  html += '<div class="cuotas-result">';
  html += '<div class="cuota-monto">$'+fmt(t.contado/cuotaMeses)+'</div>';
  html += '<div class="cuota-sub">por mes · '+cuotaMeses+' meses</div>';
  html += '<div class="cuota-nota">* Referencial. Sin interés declarado al cliente.</div>';
  html += '</div></div>';

  wrap.innerHTML = html;
}

function setCuota(m) {
  cuotaMeses = m;
  renderCarrito();
}

// ── HISTORIAL ──────────────────────────────────────────────
function guardarHistorial() {
  var t = getTotals();
  var entry = {
    id: numPRF,
    fecha: new Date().toLocaleDateString('es-EC',{day:'2-digit',month:'2-digit',year:'numeric'}),
    cliente: document.getElementById('c-nombre').value || '—',
    ciudad: document.getElementById('c-ciudad').value || '',
    items: carrito.length,
    unidades: carrito.reduce(function(s,c){ return s+c.cantidad; }, 0),
    total: t.contado,
    comision: t.comision,
    status: 'enviada',
    prods: carrito.map(function(c){ return c.nombre.substring(0,32); }).join(', ')
  };
  historial.unshift(entry);
  if (historial.length > 60) historial = historial.slice(0,60);
  localStorage.setItem('imag_hist', JSON.stringify(historial));
}

function setStatus(id, val) {
  var idx = historial.findIndex(function(h){ return h.id === id; });
  if (idx < 0) return;
  historial[idx].status = val;
  localStorage.setItem('imag_hist', JSON.stringify(historial));
  var sel = document.getElementById('sts-'+id);
  if (sel) { sel.className = 'sts ' + val; }
}

function renderHistorial() {
  var wrap = document.getElementById('hist-wrap');
  if (historial.length === 0) {
    wrap.innerHTML = '<div class="hist-hdr"><div class="hist-title">Historial</div></div><div class="hist-empty"><div style="font-size:36px;margin-bottom:8px;opacity:.3">📋</div><p>Sin cotizaciones aún</p><p style="font-size:11px;margin-top:4px;opacity:.6">Genera tu primera proforma</p></div>';
    return;
  }
  var ganadas = historial.filter(function(h){ return h.status === 'ganada'; });
  var totalCom = historial.reduce(function(s,h){ return s+h.comision; }, 0);

  var html = '';
  html += '<div class="hist-hdr"><div class="hist-title">Historial</div><button class="btn-clr" onclick="clearHist()">Limpiar</button></div>';
  html += '<div class="stat-bar">';
  html += '<div class="stat-card"><div class="stat-val">'+historial.length+'</div><div class="stat-lbl">Cotizaciones</div></div>';
  html += '<div class="stat-card green"><div class="stat-val">'+ganadas.length+'</div><div class="stat-lbl">Ganadas</div></div>';
  html += '<div class="stat-card orange"><div class="stat-val">$'+fmt(totalCom)+'</div><div class="stat-lbl">Comisión</div></div>';
  html += '</div>';

  historial.forEach(function(h) {
    var sts = h.status || 'enviada';
    html += '<div class="hcard">';
    html += '<div class="hcard-top"><div class="hcard-num">'+esc(h.id)+'</div><div class="hcard-date">'+esc(h.fecha)+'</div></div>';
    html += '<div class="hcard-client">'+esc(h.cliente)+(h.ciudad?' · '+esc(h.ciudad):'')+'</div>';
    html += '<div class="hcard-items">'+h.items+' producto'+(h.items>1?'s':'')+' · '+h.unidades+' unidades</div>';
    html += '<div class="hcard-prods">'+esc(h.prods)+'</div>';
    html += '<div class="hcard-bottom">';
    html += '<div><div class="hcard-total">$'+fmt(h.total)+'</div><div class="hcard-com">💰 $'+fmt(h.comision)+' comisión</div></div>';
    html += '<select class="sts '+sts+'" id="sts-'+esc(h.id)+'" onchange="setStatus(\''+esc(h.id)+'\',this.value)">';
    html += '<option value="enviada"'+(sts==='enviada'?' selected':'')+'>📤 Enviada</option>';
    html += '<option value="negoc"'+(sts==='negoc'?' selected':'')+'>🤝 Negociando</option>';
    html += '<option value="ganada"'+(sts==='ganada'?' selected':'')+'>✅ Ganada</option>';
    html += '<option value="perdida"'+(sts==='perdida'?' selected':'')+'>❌ Perdida</option>';
    html += '</select>';
    html += '</div></div>';
  });

  wrap.innerHTML = html;
}

function clearHist() {
  if (!confirm('¿Limpiar todo el historial?')) return;
  historial = [];
  localStorage.setItem('imag_hist', '[]');
  renderHistorial();
}

async function descargarPDF() {
  document.getElementById('loader').style.display = 'flex';
  await new Promise(function(r){ setTimeout(r, 120); });
  try {
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({unit:'mm', format:'a4'});
    var t = getTotals();
    var fecha = new Date().toLocaleDateString('es-EC', {year:'numeric', month:'long', day:'numeric'});
    var cli = {
      nombre:  document.getElementById('c-nombre').value  || '—',
      cedula:  document.getElementById('c-cedula').value  || '—',
      tel:     document.getElementById('c-tel').value     || '—',
      empresa: document.getElementById('c-empresa').value || '—',
      ciudad:  document.getElementById('c-ciudad').value  || '—'
    };
    var vnd = {
      nombre: document.getElementById('v-nombre').value || '—',
      wsp:    document.getElementById('v-wsp').value    || '—'
    };

    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(17);
    doc.text('IM AGROJARDINERIA', M, 13);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(130,180,150);
    doc.text('DISTRIBUIDOR DE MAQUINARIA AGRICOLA', M, 20);
    doc.setFontSize(8.5); doc.setTextColor(255,255,255);
    doc.text(numPRF, M, 30); doc.text(fecha, W-M, 30, {align:'right'});
    doc.setFillColor(212,101,26); doc.rect(0,38,W,2.5,'F');
    y = 50;
    doc.setTextColor(14,35,24); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
    doc.text('DATOS DEL CLIENTE', M, y); y+=4;
    doc.setDrawColor(220,220,212); doc.line(M,y,W-M,y); y+=5.5;
    doc.setFontSize(8);
    var c2 = W/2+5;
    var filas = [
      ['Cliente:', cli.nombre, 'Cedula/RUC:', cli.cedula],
      ['Telefono:', cli.tel,   'Ciudad:',     cli.ciudad],
      ['Empresa:',  cli.empresa,'Vendedor:',   vnd.nombre]
    ];
    filas.forEach(function(r) {
      doc.setFont('helvetica','bold'); doc.setTextColor(90,90,90); doc.text(r[0], M, y);
      doc.setFont('helvetica','normal'); doc.setTextColor(20,20,20); doc.text(r[1], M+19, y);
      doc.setFont('helvetica','bold'); doc.setTextColor(90,90,90); doc.text(r[2], c2, y);
      doc.setFont('helvetica','normal'); doc.setTextColor(20,20,20); doc.text(r[3], c2+23, y);
      y += 5.5;
    });
    y += 4;
    doc.setFillColor(14,35,24); doc.rect(M,y,W-2*M,7,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
    var cx = [M, M+22, M+112, M+128, M+150];
    var heads = ['CODIGO','DESCRIPCION','CANT.','P.UNIT','TOTAL'];
    heads.forEach(function(h,i){ doc.text(h, cx[i]+1, y+4.8); });
    y += 7;
    doc.setFontSize(7.8); doc.setTextColor(20,20,20);
    carrito.forEach(function(item, i) {
      var rh = 6.5;
      if (y+rh > 272) { doc.addPage(); y=18; }
      if (i%2===1) { doc.setFillColor(247,247,244); doc.rect(M,y,W-2*M,rh,'F'); }
      doc.setDrawColor(228,228,220); doc.line(M,y+rh,W-M,y+rh);
      doc.setFont('helvetica','normal');
      doc.text(item.codigo, cx[0]+1, y+4.4);
      var nb = item.nombre.length > 52 ? item.nombre.substring(0,50)+'...' : item.nombre;
      doc.text(nb, cx[1]+1, y+4.4);
      doc.text(String(item.cantidad), cx[2]+8, y+4.4, {align:'right'});
      doc.text('$'+fmt(item.pvp), cx[3]+21, y+4.4, {align:'right'});

      doc.text('$'+fmt(item.pvp*item.cantidad), cx[4]+25, y+4.4, {align:'right'});
      y += rh;
    });
    y += 6;
    doc.setFillColor(14,35,24); doc.rect(M,y,W-2*M,9,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text('TOTAL CONTADO:', M+3, y+6.2);
    doc.text('$'+fmt(t.contado), W-M-3, y+6.2, {align:'right'});
    y += 13;
    doc.setTextColor(100,100,100); doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.text('Total con tarjeta: $'+fmt(t.tarjeta), W-M, y, {align:'right'});
    y += 12;
    if (y > 242) { doc.addPage(); y=18; }
    doc.setTextColor(14,35,24); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
    doc.text('CONDICIONES', M, y); y+=3.5;
    doc.setDrawColor(220,220,212); doc.line(M,y,W-M,y); y+=5;
    doc.setTextColor(90,90,90); doc.setFont('helvetica','normal'); doc.setFontSize(7.8);
    var conds = [
      'Garantia: 12 meses contra defectos de fabricacion. Valida con factura.',
      'Entrega: Inmediata en stock. Pedidos especiales: 5-10 dias habiles.',
      'Pago: Contado, transferencia o tarjeta de credito/debito.',
      'Contacto: '+vnd.nombre+' | WhatsApp: '+vnd.wsp,
      'Proforma valida 7 dias. Precios en USD. '+numPRF
    ];
    conds.forEach(function(l){ doc.text(l, M, y); y+=4.8; });
    doc.setFillColor(212,101,26); doc.rect(0,289,W,8,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    doc.text('IM AGROJARDINERIA · Distribuidor de Maquinaria Agricola', W/2, 294, {align:'center'});
    doc.save(numPRF+'.pdf');
    toast('✅ PDF descargado correctamente');
  } catch(e) {
    console.error(e);
    toast('❌ Error al generar PDF. Intenta de nuevo.');
  } finally {
    document.getElementById('loader').style.display = 'none';
  }
}

// ── WHATSAPP ───────────────────────────────────────────────
function enviarWhatsApp() {
  var wsp = document.getElementById('v-wsp').value.trim().replace(/[^0-9]/g, '');
  var t = getTotals();
  var cli = document.getElementById('c-nombre').value || 'Cliente';
  var ciudad = document.getElementById('c-ciudad').value || '';
  var msg = '🌿 *IM AGROJARDINERÍA*\n*PROFORMA ' + numPRF + '*\n\n';
  msg += '*Cliente:* ' + cli + (ciudad ? ' · ' + ciudad : '') + '\n\n';
  msg += '*Productos:*\n';
  carrito.forEach(function(item) {
    msg += '• ' + item.nombre + '\n  ' + item.cantidad + ' × $' + fmt(item.pvp) + ' = *$' + fmt(item.pvp*item.cantidad) + '*\n';
  });
  msg += '\n*TOTAL CONTADO: $' + fmt(t.contado) + '*\n';
  msg += 'Total con tarjeta: $' + fmt(t.tarjeta) + '\n\n';
  msg += '_Proforma válida 7 días. Precios en USD._';
  var tel = wsp ? '593' + wsp.replace(/^0/, '') : '';
  window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(msg) + (tel ? '&phone='+tel : ''), '_blank');
}

function nuevaCotizacion() {
  if (!confirm('¿Iniciar nueva cotización? Se limpiará el carrito.')) return;

  syncContador();
  ['c-nombre','c-cedula','c-tel','c-empresa','c-ciudad','v-nombre','v-wsp'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  ir('catalogo');
}

// ── UTILS ──────────────────────────────────────────────────
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '0.00';
  return Number(n).toLocaleString('es-EC', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function esc(s) {
  var str = String(s || '');
  var map = {'&':'&amp;', '<':'&lt;', '>':'&gt;'};
  return str.replace(/[&<>]/g, function(c){ return map[c]; });
}

function toast(msg, dur) {
  dur = dur || 2600;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, dur);
}
